<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff"/>
      <stop offset="50%" style="stop-color:#e0f2fe"/>
      <stop offset="100%" style="stop-color:#f5f3ff"/>
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="500" r="150" fill="#6366f1" opacity="0.05"/>
  <circle cx="700" cy="100" r="200" fill="#a855f7" opacity="0.05"/>
  
  <!-- Main Panel -->
  <g filter="url(#shadow)">
    <rect x="100" y="80" width="600" height="440" rx="16" fill="white"/>
    
    <!-- Panel Header -->
    <rect x="100" y="80" width="600" height="50" rx="16" fill="#f8fafc"/>
    <rect x="100" y="114" width="600" height="16" fill="#f8fafc"/>
    <circle cx="130" cy="105" r="8" fill="#ff5f56"/>
    <circle cx="155" cy="105" r="8" fill="#ffbd2e"/>
    <circle cx="180" cy="105" r="8" fill="#27ca40"/>
    
    <!-- Sidebar -->
    <rect x="100" y="130" width="70" height="390" fill="#f8fafc"/>
    <text x="135" y="165" font-size="24" text-anchor="middle">🏛️</text>
    <rect x="117" y="190" width="36" height="36" rx="6" fill="#818cf8"/>
    <rect x="117" y="236" width="36" height="36" rx="6" fill="#e2e8f0"/>
    <rect x="117" y="282" width="36" height="36" rx="6" fill="#e2e8f0"/>
    
    <!-- Tabs -->
    <rect x="190" y="145" width="70" height="28" rx="6" fill="url(#primaryGrad)"/>
    <text x="225" y="164" font-size="11" fill="white" text-anchor="middle" font-weight="500">GPT-5.1</text>
    
    <rect x="270" y="145" width="80" height="28" rx="6" fill="#f1f5f9"/>
    <text x="310" y="164" font-size="11" fill="#64748b" text-anchor="middle" font-weight="500">Claude 4.5</text>
    
    <rect x="360" y="145" width="70" height="28" rx="6" fill="#f1f5f9"/>
    <text x="395" y="164" font-size="11" fill="#64748b" text-anchor="middle" font-weight="500">Gemini 3</text>
    
    <rect x="440" y="145" width="60" height="28" rx="6" fill="#f1f5f9"/>
    <text x="470" y="164" font-size="11" fill="#64748b" text-anchor="middle" font-weight="500">Grok 3</text>
    
    <!-- Content lines -->
    <rect x="190" y="195" width="480" height="14" rx="7" fill="#f1f5f9"/>
    <rect x="190" y="220" width="350" height="14" rx="7" fill="#f1f5f9"/>
    <rect x="190" y="245" width="420" height="14" rx="7" fill="#f1f5f9"/>
    <rect x="190" y="270" width="280" height="14" rx="7" fill="#f1f5f9"/>
    
    <!-- Review Section -->
    <rect x="190" y="310" width="480" height="80" rx="8" fill="#fef3c7"/>
    <text x="210" y="335" font-size="12" fill="#92400e" font-weight="600">📊 互評結果</text>
    <rect x="210" y="350" width="200" height="10" rx="5" fill="#fde68a"/>
    <rect x="210" y="368" width="150" height="10" rx="5" fill="#fde68a"/>
    
    <!-- Chairman Section -->
    <rect x="190" y="405" width="480" height="90" rx="8" fill="#ecfdf5"/>
    <text x="210" y="430" font-size="12" fill="#065f46" font-weight="600">✨ 主席彙整</text>
    <rect x="210" y="445" width="440" height="10" rx="5" fill="#a7f3d0"/>
    <rect x="210" y="463" width="380" height="10" rx="5" fill="#a7f3d0"/>
    <rect x="210" y="481" width="300" height="10" rx="5" fill="#a7f3d0"/>
  </g>
  
  <!-- Floating elements -->
  <g filter="url(#shadow)">
    <rect x="620" y="50" width="120" height="40" rx="20" fill="white"/>
    <circle cx="650" cy="70" r="12" fill="#10b981"/>
    <rect x="670" y="64" width="50" height="12" rx="6" fill="#f1f5f9"/>
  </g>
  
  <g filter="url(#shadow)">
    <rect x="50" y="250" width="100" height="80" rx="12" fill="white"/>
    <circle cx="100" cy="285" r="20" fill="url(#primaryGrad)"/>
    <text x="100" y="292" font-size="16" fill="white" text-anchor="middle">AI</text>
    <rect x="70" y="310" width="60" height="8" rx="4" fill="#f1f5f9"/>
  </g>
</svg>

